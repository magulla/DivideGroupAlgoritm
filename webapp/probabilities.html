<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Win Probabilities — World Cup 2026 Fantasy Quiz</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <h1>📊 Win Probabilities</h1>
    <p class="tagline">Estimated chance each person wins the pool — no picks shown, just outcomes.</p>
  </header>

  <main>
    <section class="card">
      <h2>Team odds</h2>
      <p class="hint" id="odds-note"></p>
      <div class="table-scroll">
        <table>
          <thead><tr><th>Team</th><th>Win it all</th></tr></thead>
          <tbody id="odds-body"></tbody>
        </table>
      </div>
    </section>

    <section class="card">
      <h2>Pool win probability</h2>
      <p class="hint" id="results-note"></p>
      <table>
        <thead><tr><th>#</th><th>Name</th><th>Win %</th></tr></thead>
        <tbody id="prob-body"></tbody>
      </table>
    </section>
  </main>

  <footer>
    <p><a href="index.html">Back to the quiz</a></p>
  </footer>

  <script type="module" src="js/probabilities.js"></script>
</body>
</html>
